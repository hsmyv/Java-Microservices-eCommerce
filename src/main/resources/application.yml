#spring.application.name=ecom
#spring.h2.console.enabled=true
#spring.datasource.url=jdbc:h2:mem:test
spring:
  application:
    name: ecom

  datasource:
    url: jdbc:h2:mem:test
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8080